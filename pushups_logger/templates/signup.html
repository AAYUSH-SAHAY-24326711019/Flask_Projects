{% extends 'base.html' %}
{% block head %}
{{ super() }}

{% endblock %}

    {% block content %}
<div class="container">

<div class="glass">

<h2>Create Account</h2>

<form method="POST" action="/signup">

<input type="text"
placeholder="Enter your name..."
name="username"
required>

    <input type="email"
placeholder="Enter your email..."
name="email"
required>

<input type="password"
placeholder="Password"
name="password"
required>

<button type="submit">
Signup
</button>

</form>

<p>

Already have account?

<a href="/login">
Login
</a>

</p>

</div>

</div>
